services:
  postgres:
    image: postgres:16-alpine
    container_name: bloom_postgres
    restart: always
    environment:
      POSTGRES_USER: dhruv
      POSTGRES_PASSWORD: dhruv
      POSTGRES_DB: bloom_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
